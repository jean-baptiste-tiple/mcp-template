# CI — Build only
# Type-check, lint et tests sont exécutés EN LOCAL par /commit-push avant push.
# La CI ne lance que pnpm build pour valider le déploiement Vercel
# et catcher les erreurs spécifiques à l'environnement Linux.
name: CI — Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build
